name: Intake agent

# Triggers on new training requests and PDP requests.
# Posts a stage-specific welcome, advances the state label, and leaves an
# @-mention prompt for the Copilot coding agent / maintainer to drive the
# AI intake (clarifying questions and plan drafting).

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  intake:
    if: |
      github.event.action != 'labeled' && (
        contains(github.event.issue.labels.*.name, 'training-request') ||
        contains(github.event.issue.labels.*.name, 'pdp-request')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Determine request kind
        id: kind
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const kind = labels.includes('pdp-request') ? 'pdp' : 'training';
            core.setOutput('kind', kind);

      - name: Post intake comment
        uses: actions/github-script@v7
        env:
          KIND: ${{ steps.kind.outputs.kind }}
        with:
          script: |
            const kind = process.env.KIND;
            const lines = kind === 'pdp'
              ? [
                  "### Personal Development Plan — Intake",
                  "",
                  "Thanks for filing a PDP. This is the **Intake** stage.",
                  "",
                  "An AI intake agent will:",
                  "1. Read your answers and ask any clarifying questions in this thread.",
                  "2. Draft a roadmap with milestones, success metrics, and linked Training Requests.",
                  "",
                  "A human reviewer (and mentor, if requested) will then refine the plan with you.",
                  "",
                  "See [docs/WORKFLOW.md](../blob/main/docs/WORKFLOW.md) and [docs/PDP-WORKFLOW.md](../blob/main/docs/PDP-WORKFLOW.md).",
                  "",
                  "---",
                  "@github-copilot please run the intake agent using `.github/agents/intake-agent.md` for this PDP.",
                ]
              : [
                  "### Training Request — Intake",
                  "",
                  "Thanks for the training request. This is the **Intake** stage.",
                  "",
                  "An AI intake agent will:",
                  "1. Ask clarifying questions here if anything is ambiguous.",
                  "2. Draft a proposed training plan for human review.",
                  "",
                  "See [docs/WORKFLOW.md](../blob/main/docs/WORKFLOW.md) for the full process.",
                  "",
                  "---",
                  "@github-copilot please run the intake agent using `.github/agents/intake-agent.md` for this training request.",
                ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join("\n"),
            });

      - name: Advance state new -> intake
        if: contains(github.event.issue.labels.*.name, 'state:new')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number };
            await github.rest.issues.removeLabel({ ...issue, name: 'state:new' }).catch(() => {});
            await github.rest.issues.addLabels({ ...issue, labels: ['state:intake', 'needs:requestor'] });

      - name: Assign default reviewer
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['tdevere'],
            }).catch(e => core.warning(`Could not assign: ${e.message}`));
